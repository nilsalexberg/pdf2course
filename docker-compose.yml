services:
  redis:
    image: redis:7-alpine
    # Enable AOF persistence to prevent BullMQ queue state loss
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Nuxt runtimeConfig overrides (crucial to override at runtime with prefix NUXT_)
      NUXT_REDIS_URL: redis://redis:6379
      NUXT_SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      NUXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NUXT_PUBLIC_SUPABASE_KEY: ${SUPABASE_KEY}
      NUXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      NUXT_PUBLIC_SITE_URL: ${SITE_URL}
      # Read via process.env.GEMINI_API_KEY directly at runtime
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: production

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdf2course
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d  # consolidated init SQL
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  redis_data:
  postgres_data:
  minio_data:
